apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-manual
  namespace: batch-jobs
spec:
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: aliyun-registry-cred
      containers:
      - name: cleanup-batch
        image: crpi-e2h2rfj3kunrwe5n.cn-hangzhou.personal.cr.aliyuncs.com/mike-docker-registry/spring-batch-cleanup-job:__SET_BY_DEPLOY__
        imagePullPolicy: Always
        env:
        # Database configuration
        - name: DB_HOST
          # Placeholder substituted by the Jenkins CD pipeline
          # (DB_HOST build parameter) and by scripts/lib-local.sh's
          # apply_local_job for local E2E. Set to the cluster-reachable
          # IP/hostname of the PostgreSQL server the pod should use.
          value: "__DB_HOST__"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_DATABASE
          # Placeholder substituted by the Jenkins CD pipeline
          # (DB_DATABASE build parameter) and by scripts/lib-local.sh's
          # apply_local_job for local E2E. Matches the
          # ${DB_DATABASE:testdb} default in src/main/resources/application.yml.
          value: "__DB_DATABASE__"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password

        # Error injection for testing (default: no error)
        # Set ERROR_INJECTION_STEP1 true to inject error in Step 1
        # Set ERROR_INJECTION_STEP2 true to inject error in Step 2
        - name: ERROR_INJECTION_STEP1
          value: "false"
        - name: ERROR_INJECTION_STEP2
          value: "false"
        # ERROR_TYPE: PERMANENT (fails after retries) or TRANSIENT (recovers on retry)
        - name: ERROR_TYPE
          value: "PERMANENT"
