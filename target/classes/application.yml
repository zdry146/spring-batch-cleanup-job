spring:
  application:
    name: spring-batch-cleanup-job

  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.232.128}:5432/testdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  batch:
    job:
      enabled: true
      name: cleanupUnpublishedPostsJob
    jdbc:
      initialize-schema: always

logging:
  level:
    com.example.cleanupjob: INFO
    org.springframework.batch: INFO