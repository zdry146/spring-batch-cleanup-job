spring:
  application:
    name: spring-batch-cleanup-job

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_DATABASE:testdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  batch:
    job:
      # Spring Boot's default JobLauncherApplicationRunner is disabled. Our
      # CleanupJobRunner replaces it so a same-day manual run is a graceful
      # no-op when the CronJob already COMPLETED (see CleanupJobRunner).
      enabled: false
      name: cleanupUnpublishedPostsJob
    jdbc:
      initialize-schema: always

logging:
  level:
    com.example.cleanupjob: INFO
    org.springframework.batch: INFO